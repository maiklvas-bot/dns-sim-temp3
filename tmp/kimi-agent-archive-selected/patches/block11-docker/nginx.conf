# =============================================================================
# Nginx — Reverse Proxy + SSL для DNS SimCenter
# =============================================================================
#
# УСТАНОВКА SSL:
#   1. Создать директорию: mkdir -p /mnt/agents/dns-sim-temp3/ssl
#   2. Поместить сертификаты:
#      - ssl/cert.pem    — SSL сертификат (или fullchain)
#      - ssl/key.pem     — Приватный ключ
#
# LET'S ENCRYPT (бесплатно):
#   certbot certonly --standalone -d your-domain.com
#   ln -s /etc/letsencrypt/live/your-domain.com/fullchain.pem ssl/cert.pem
#   ln -s /etc/letsencrypt/live/your-domain.com/privkey.pem ssl/key.pem
#
# БЕЗОПАСНОСТЬ:
# — HTTP/2 для производительности
# — HSTS заголовок (1 год)
# — Скрытие версии Nginx
# — Buffering для защиты от медленных клиентов
# — Ограничение размера body (10MB)
# =============================================================================

# Количество worker процессов (auto = число CPU ядер)
worker_processes auto;

# Ограничение файловых дескрипторов
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ========================================================================
    # Базовые настройки
    # ========================================================================
    
    # MIME типы
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Формат логов
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Производительность
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # Таймауты
    keepalive_timeout 65;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    
    # Ограничения
    client_max_body_size 10M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    
    # Скрытие версии Nginx (безопасность)
    server_tokens off;

    # ========================================================================
    # Gzip сжатие
    # ========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # ========================================================================
    # Upstream: приложение DNS SimCenter
    # ========================================================================
    upstream app {
        server app:5000;
        # keepalive соединения для производительности
        keepalive 32;
    }

    # ========================================================================
    # Server: HTTP (перенаправление на HTTPS)
    # ========================================================================
    server {
        listen 80;
        listen [::]:80;
        
        # Принимаем любой домен (или замените на ваш)
        server_name _;
        
        # ACME challenge для Let's Encrypt (если используется)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Все остальные запросы → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========================================================================
    # Server: HTTPS
    # ========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        
        server_name _;
        
        # -------------------------------------------------------------------
        # SSL конфигурация
        # -------------------------------------------------------------------
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # Современные TLS настройки (A+ на SSL Labs)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        
        # -------------------------------------------------------------------
        # HSTS — принудительный HTTPS (1 год)
        # -------------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        
        # Базовые security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # -------------------------------------------------------------------
        # Локация: API и WebSocket
        # -------------------------------------------------------------------
        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;
            
            # WebSocket поддержка
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Передача реальных IP и хоста
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Таймауты для долгих запросов (PDF генерация, экспорт)
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering для защиты от медленных клиентов
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Кэширование keepalive соединений
            proxy_set_header Connection "";
        }
        
        # -------------------------------------------------------------------
        # Локация: статические файлы (кэширование)
        # -------------------------------------------------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://app;
            proxy_set_header Host $host;
            
            # Кэширование статики в браузере (30 дней)
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
