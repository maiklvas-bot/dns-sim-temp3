# =============================================================================
# DNS SimCenter — Production Docker Compose
# =============================================================================
#
# ВАРИАНТЫ ЗАПУСКА:
#   docker compose up -d                    # Только приложение
#   docker compose --profile with-nginx up -d # Приложение + Nginx reverse proxy
#
# КОМАНДЫ:
#   docker compose build --no-cache         # Пересобрать образы
#   docker compose logs -f app              # Логи приложения
#   docker compose ps                     # Статус контейнеров
#   docker compose down -v                # Остановить и удалить volumes
#
# ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ (.env файл):
#   PORT              — порт приложения (default: 5000)
#   SESSION_SECRET    — секретный ключ сессий (ОБЯЗАТЕЛЬНО!)
#   ADMIN_PASSWORD    — пароль администратора
#   EVALUATOR_PASSWORD — пароль оценщика
# =============================================================================

services:
  # ============================================================================
  # Основное приложение DNS SimCenter
  # ============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: dns-simcenter:latest
    container_name: dns-simcenter-app
    # Загрузка переменных из .env файла
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
      # Путь к SQLite (persistent volume)
      SQLITE_PATH: /app/data/data.db
      # Синхронизация staff-аккаунтов из env
      SYNC_STAFF_FROM_ENV: "true"
    ports:
      # Привязка к localhost для безопасности (через Nginx проксируется наружу)
      - "127.0.0.1:${APP_PORT:-5000}:${PORT:-5000}"
    volumes:
      # Persistent volume для SQLite базы данных
      - ./storage/data:/app/data
      # Persistent volume для загруженных медиафайлов
      - ./uploads:/app/uploads
    restart: unless-stopped
    # dumb-init для корректной обработки сигналов
    init: true
    # Лимиты ресурсов для предотвращения исчерпания хоста
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    # Health check: проверка доступности API (/api/health endpoint)
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT:-5000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Graceful shutdown: время на завершение запросов
    stop_grace_period: 30s
    stop_signal: SIGTERM

  # ============================================================================
  # Nginx Reverse Proxy (опционально — запуск через --profile with-nginx)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: dns-simcenter-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Конфигурация Nginx (read-only)
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL сертификаты (read-only)
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    # Запускается только с профилем with-nginx
    profiles:
      - with-nginx
