services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dns-simcenter
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
      SQLITE_PATH: /app/data/data.db
      SYNC_STAFF_FROM_ENV: "true"
    ports:
      - "127.0.0.1:${APP_PORT:-5000}:${PORT:-5000}"
    restart: unless-stopped
    init: true
    volumes:
      - ./storage/data:/app/data
      - ./uploads:/app/uploads
